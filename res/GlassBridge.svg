<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="243.84mm"
     height="128.5mm"
     viewBox="0 0 243.84 128.5">
  <defs>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="128.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#141b22"/>
      <stop offset="100%" stop-color="#091018"/>
    </linearGradient>

    <linearGradient id="screenGrad" x1="0" y1="14" x2="0" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06111b"/>
      <stop offset="100%" stop-color="#01060a"/>
    </linearGradient>

    <style>
      .title {
        font-family: DejaVu Sans, Arial, sans-serif;
        font-size: 5.8px;
        fill: #f1d78b;
        text-anchor: middle;
        letter-spacing: 0.6px;
      }
      .subtitle {
        font-family: DejaVu Sans, Arial, sans-serif;
        font-size: 2.6px;
        fill: #9dc6db;
        text-anchor: middle;
        opacity: 0.88;
      }
      .label {
        font-family: DejaVu Sans, Arial, sans-serif;
        font-size: 2.9px;
        fill: #ffffff;
        text-anchor: middle;
        opacity: 0.92;
      }
      .labelSmall {
        font-family: DejaVu Sans, Arial, sans-serif;
        font-size: 2.45px;
        fill: #ffffff;
        text-anchor: middle;
        opacity: 0.9;
      }
      .group {
        font-family: DejaVu Sans, Arial, sans-serif;
        font-size: 2.55px;
        fill: #f1d78b;
        text-anchor: middle;
        opacity: 0.95;
      }
      .accent {
        stroke: #876a2f;
        stroke-width: 0.55;
        opacity: 0.45;
        fill: none;
      }
      .blueAccent {
        stroke: #2b5165;
        stroke-width: 0.45;
        opacity: 0.36;
        fill: none;
      }
      .micro {
        font-family: DejaVu Sans, Arial, sans-serif;
        font-size: 2.0px;
        fill: #8fb7cb;
        text-anchor: middle;
        opacity: 0.92;
      }
    </style>
  </defs>

  <rect x="0" y="0" width="243.84" height="128.5" fill="url(#panelGrad)"/>

  <rect x="3.2" y="3.2" width="237.44" height="122.1" rx="3.0" ry="3.0"
        fill="none" stroke="#8a6b2f" stroke-width="0.55" opacity="0.62"/>

  <rect x="24.0" y="14.0" width="195.0" height="76.0" rx="4.0" ry="4.0"
        fill="url(#screenGrad)" stroke="#3b657c" stroke-width="1.15"/>

  <rect x="24.9" y="14.9" width="193.2" height="74.2" rx="3.2" ry="3.2"
        fill="none" stroke="#244c63" stroke-width="0.35" opacity="0.42"/>

  <text x="121.92" y="9.3" class="title">GLASS BRIDGE</text>
  <text x="121.92" y="96.8" class="subtitle">CV VISUAL BRIDGE DISPLAY</text>
  <text x="121.92" y="101.0" class="micro">version 2.2.0 panel revision</text>

  <!-- left control labels -->
  <text x="12.0" y="12.4" class="label">X SCALE</text>
  <text x="12.0" y="30.4" class="label">Y SCALE</text>
  <text x="12.0" y="48.4" class="label">Z ENERGY</text>
  <text x="12.0" y="66.4" class="label">DOTS</text>
  <text x="12.0" y="84.4" class="label">LINES</text>
  <text x="12.0" y="102.4" class="label">PARTICLES</text>

  <!-- right control labels aligned to new 228mm knob center -->
  <text x="228.0" y="12.4" class="label">SIZE</text>
  <text x="228.0" y="30.4" class="label">PERSIST</text>
  <text x="228.0" y="48.4" class="label">SPREAD</text>
  <text x="228.0" y="66.4" class="label">COLOR</text>
  <text x="228.0" y="84.4" class="label">P BLEND</text>
  <text x="228.0" y="102.4" class="label">GLOW</text>

  <!-- switch headings -->
  <text x="27.0" y="99.2" class="group">SAMPLE</text>
  <text x="213.0" y="99.2" class="group">SOURCE</text>

  <!-- switch legends -->
  <text x="27.0" y="110.7" class="micro">CONT / CLK / TRIG</text>
  <text x="213.0" y="110.7" class="micro">POINT / LINE / BOTH</text>

  <!-- button group labels -->
  <text x="27.0" y="125.4" class="group">CLR</text>
  <text x="213.0" y="125.4" class="group">FRZ</text>

  <!-- bottom jack labels -->
  <text x="48.0"  y="113.8" class="labelSmall">X In</text>
  <text x="69.0"  y="113.8" class="labelSmall">Y In</text>
  <text x="90.0"  y="113.8" class="labelSmall">Z In</text>
  <text x="111.0" y="113.8" class="labelSmall">Size</text>
  <text x="132.0" y="113.8" class="labelSmall">Persist</text>
  <text x="153.0" y="113.8" class="labelSmall">Chaos</text>
  <text x="174.0" y="113.8" class="labelSmall">Clock</text>
  <text x="195.0" y="113.8" class="labelSmall">Reset</text>
  <text x="213.0" y="113.8" class="labelSmall">Freeze</text>

  <!-- micro under-jack labels -->
  <text x="48.0"  y="118.3" class="micro">X</text>
  <text x="69.0"  y="118.3" class="micro">Y</text>
  <text x="90.0"  y="118.3" class="micro">Z</text>
  <text x="111.0" y="118.3" class="micro">M1</text>
  <text x="132.0" y="118.3" class="micro">M2</text>
  <text x="153.0" y="118.3" class="micro">M3</text>
  <text x="174.0" y="118.3" class="micro">CLK</text>
  <text x="195.0" y="118.3" class="micro">RST</text>
  <text x="213.0" y="118.3" class="micro">FRZ</text>

  <!-- decorative accents -->
  <path d="M36 104 C76 104, 165 104, 204 104" class="blueAccent"/>
  <path d="M23 92 C50 95, 191 95, 217 92" class="blueAccent"/>
  <path d="M21.8 10.7 L18.4 13.8" class="accent"/>
  <path d="M222.0 10.7 L225.4 13.8" class="accent"/>
  <path d="M17.3 16.0 L17.3 118.0" class="blueAccent"/>
  <path d="M223.0 16.0 L223.0 118.0" class="blueAccent"/>
</svg>
